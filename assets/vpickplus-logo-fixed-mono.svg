
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-label="VPick+ logo">
  <title>VPick+ logo</title>
  <defs>
    <style>
      .teal{fill:#111315}
      .black{fill:#111315}
    </style>
  </defs>
  <!-- Build both V arms explicitly (no scale/rotate transforms) -->
  <g transform="translate(8,12)">
    <!-- Left arm (with horizontal barcode stripes) -->
    <polygon class="teal" points="0,0 24,0 54,92 34,92"/>
    <g opacity="0.75">
      <rect class="teal" x="2" y="6" width="20" height="2"/>
      <rect class="teal" x="2" y="14" width="20" height="1.4"/>
      <rect class="teal" x="2" y="21" width="20" height="1.8"/>
      <rect class="teal" x="2" y="28" width="20" height="1.2"/>
      <rect class="teal" x="2" y="36" width="20" height="1.8"/>
      <rect class="teal" x="2" y="44" width="20" height="1.2"/>
      <rect class="teal" x="2" y="52" width="20" height="1.6"/>
      <rect class="teal" x="2" y="60" width="20" height="1.2"/>
      <rect class="teal" x="2" y="68" width="20" height="1.6"/>
      <rect class="teal" x="2" y="76" width="20" height="1.2"/>
      <rect class="teal" x="2" y="84" width="20" height="1.6"/>
    </g>
    <!-- Right arm (explicit coordinates) -->
    <!-- Mirror of left: start at 118,0 to 142,0 to 112,92 to 92,92 -->
    <polygon class="teal" points="118,0 142,0 112,92 92,92"/>

    <!-- Wordmark -->
    <g transform="translate(170,8)">
      <text class="black" x="0" y="56" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="500" letter-spacing="0.2">Pick</text>
      <circle class="teal" cx="224" cy="18" r="11"/>
      <text class="teal" x="218.5" y="22" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">+</text>
    </g>
  </g>
</svg>
