<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPickPlus — Live Picker Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');
  :root {
    --bg:#0a0e14; --panel:#0f1520; --border:#1e2d3d; --accent:#00d4ff;
    --accent2:#00ff9d; --text:#c8d8e8; --dim:#4a6070;
    --aisle-bg:#0d1a26; --aisle-active:#0f2535; --grid-line:#131f2e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1000}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
  .logo{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--accent);letter-spacing:3px}
  .logo span{color:var(--accent2)}
  .header-stats{display:flex;gap:28px}
  .stat{text-align:center}
  .stat-val{font-size:26px;font-weight:900;color:var(--accent);line-height:1;font-family:'Share Tech Mono',monospace}
  .stat-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:1px}
  .header-right{display:flex;align-items:center;gap:14px}
  .live-indicator{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;color:var(--accent2);text-transform:uppercase}
  .live-dot{width:8px;height:8px;background:var(--accent2);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 8px var(--accent2)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  .conn-status{font-size:8px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid var(--border)}
  .conn-status.connected{color:var(--accent2);border-color:rgba(0,255,157,.3)}
  .pstatus.asleep{background:rgba(250,204,21,.1);color:#facc15;border:1px solid rgba(250,204,21,.25)}
  .picker-dot.asleep{opacity:.3;filter:grayscale(.8)}
  .main{display:flex;flex:1;overflow:hidden}
  .map-area{flex:1;padding:12px 14px;overflow:hidden;display:flex;flex-direction:column;gap:3px}
  .map-title{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;flex-shrink:0}
  .bay-ruler-row{display:flex;margin-bottom:1px;flex-shrink:0}
  .bay-ruler-spacer{width:50px;flex-shrink:0}
  .bay-ruler-end{width:16px;flex-shrink:0}
  .bay-ruler{flex:1;display:grid;grid-template-columns:repeat(45,1fr)}
  .bay-ruler-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--dim);text-align:center}
  .dc-layout{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .cluster-divider{display:flex;align-items:center;height:14px;flex-shrink:0}
  .cluster-divider-line{flex:1;height:1px;background:var(--border);opacity:.35}
  .cluster-divider-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:0 8px;white-space:nowrap}
  .aisle-row-wrap{display:flex;align-items:stretch;min-height:0}
  .aisle-name{width:42px;flex-shrink:0;font-family:'Share Tech Mono',monospace;font-size:10px;text-align:right;padding-right:6px;display:flex;align-items:center;justify-content:flex-end;letter-spacing:1px}
  .dir-arrow{width:8px;flex-shrink:0;font-size:8px;color:rgba(74,96,112,.5);display:flex;align-items:center;justify-content:center}
  .aisle-track{flex:1;position:relative;border:1px solid var(--border);border-radius:3px;background:var(--aisle-bg);display:grid;grid-template-columns:repeat(45,1fr);transition:background .3s,border-color .3s;overflow:visible}
  .aisle-track.has-picker{background:var(--aisle-active);border-color:rgba(0,212,255,.22)}
  .aisle-track.empty-slot{border-style:dashed;opacity:.2}
  .bay-slot{position:relative;border-right:1px solid var(--grid-line)}
  .bay-slot:last-child{border-right:none}
  .aisle-cap{width:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .turn-arc{width:11px;height:70%;border:2px solid;border-left:none;border-radius:0 8px 8px 0}
  .dead-bar{width:3px;height:50%;border-radius:2px;background:var(--border)}
  .picker-dot{position:absolute;width:9px;height:9px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none}
  .picker-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid currentColor;opacity:.45;animation:ripple 2s ease-out infinite}
  /* Real pickers get a brighter, larger ripple */
  .picker-dot.real{width:11px;height:11px}
  .picker-dot.real::after{inset:-4px;animation:ripple-real 1.5s ease-out infinite}
  @keyframes ripple{0%{transform:scale(1);opacity:.45}100%{transform:scale(3);opacity:0}}
  @keyframes ripple-real{0%{transform:scale(1);opacity:.7}100%{transform:scale(3.5);opacity:0}}
  .picker-dot-label{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:7px;white-space:nowrap;pointer-events:none;text-shadow:0 0 4px #0a0e14}
  .picker-dot.real .picker-dot-label{font-size:8px;font-weight:bold;top:-15px}
  .sidebar{width:255px;border-left:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  .sidebar-header{padding:11px 14px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
  .picker-list{flex:1;overflow-y:auto;padding:5px}
  .picker-list::-webkit-scrollbar{width:3px}
  .picker-list::-webkit-scrollbar-thumb{background:var(--border)}
  .picker-card{border:1px solid var(--border);border-radius:3px;padding:7px 9px 7px 12px;margin-bottom:4px;position:relative;overflow:hidden;transition:all .3s}
  .picker-card.active{background:rgba(0,212,255,.04);border-color:rgba(0,212,255,.18)}
  .picker-card.real-active{background:rgba(0,255,157,.06);border-color:rgba(0,255,157,.3)}
  .picker-card.gone{opacity:.33}
  .pbar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
  .picker-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
  .picker-id{font-family:'Share Tech Mono',monospace;font-size:12px;font-weight:700}
  .pstatus{font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:2px}
  .pstatus.picking{background:rgba(0,255,157,.12);color:var(--accent2)}
  .pstatus.live{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
  .pstatus.idle{background:rgba(74,96,112,.2);color:var(--dim)}
  .pdetail{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:2px}
  .pdetail strong{font-family:'Share Tech Mono',monospace;color:var(--text);font-size:10px}
  .ppicks{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);margin-top:2px}
  .activity-feed{border-top:1px solid var(--border);height:145px;flex-shrink:0;display:flex;flex-direction:column}
  .feed-hdr{padding:6px 14px;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0}
  .feed-scroll{flex:1;overflow-y:auto;padding:2px 6px}
  .feed-scroll::-webkit-scrollbar{display:none}
  .feed-item{display:flex;gap:5px;align-items:baseline;padding:2px 0;font-size:9px;border-bottom:1px solid rgba(30,45,61,.4);animation:feedIn .3s ease-out}
  .feed-item.real-event{background:rgba(0,212,255,.05)}
  @keyframes feedIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
  .ftime{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--dim);flex-shrink:0}
  .fuser{font-family:'Share Tech Mono',monospace;font-size:8px;flex-shrink:0;min-width:42px}
  .floc{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:8px}
  .fbadge{font-size:7px;color:var(--accent2);letter-spacing:1px;margin-left:2px}
  .zone-legend{border-top:1px solid var(--border);padding:7px 14px;flex-shrink:0}
  .zl-title{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
  .zl-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
  .zl-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim)}
  .zl-swatch{width:7px;height:7px;border-radius:1px;flex-shrink:0}
</style>
</head>
<body>

<header>
  <div class="logo">V<span>PICK</span>PLUS</div>
  <div class="header-stats">
    <div class="stat"><div class="stat-val" id="statActive">0</div><div class="stat-label">Active Pickers</div></div>
    <div class="stat"><div class="stat-val" id="statPicks">0</div><div class="stat-label">Picks Today</div></div>
    <div class="stat"><div class="stat-val" id="statRate">0</div><div class="stat-label">Picks / Hr</div></div>
  </div>
  <div class="header-right">
    <div class="conn-status" id="connStatus">Connecting…</div>
    <div class="live-indicator"><div class="live-dot"></div>Live</div>
  </div>
</header>

<div class="main">
  <div class="map-area">
    <div class="map-title">Distribution Center — Floor View · Bay 01 ←Front &nbsp; Back→ Bay 45</div>
    <div class="bay-ruler-row">
      <div class="bay-ruler-spacer"></div>
      <div class="bay-ruler" id="bayRuler"></div>
      <div class="bay-ruler-end"></div>
    </div>
    <div class="dc-layout" id="dcLayout"></div>
  </div>
  <div class="sidebar">
    <div class="sidebar-header">Picker Status</div>
    <div class="picker-list" id="pickerList"></div>
    <div class="activity-feed">
      <div class="feed-hdr">Activity Feed</div>
      <div class="feed-scroll" id="feedScroll"></div>
    </div>
    <div class="zone-legend">
      <div class="zl-title">Zones</div>
      <div class="zl-grid" id="zlGrid"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcdm_RkfQgW1eZJcQxOPaFYdXq1wsuZtg",
  authDomain: "vpickplus-dashboard.firebaseapp.com",
  databaseURL: "https://vpickplus-dashboard-default-rtdb.firebaseio.com",
  projectId: "vpickplus-dashboard",
  storageBucket: "vpickplus-dashboard.firebasestorage.app",
  messagingSenderId: "777376591510",
  appId: "1:777376591510:web:5cd735200a32bbe595dcb7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── CONSTANTS ─────────────────────────────────
const BAYS = 45;
const TIMEOUT_MS = 5 * 60 * 1000;

const CLUSTERS = [
  { label:'Zone 08 / 09', color:'#00d4ff',
    pairs:[{fwd:'08A',rev:'09A'},{fwd:'08B',rev:'09B'},{fwd:'08C',rev:'09C'}] },
  { label:'Zone 13 / 14', color:'#00ff9d',
    pairs:[{fwd:'13A',rev:'14A'},{fwd:'13B',rev:'14B'},{fwd:'13C',rev:'14C'}] },
  { label:'Zone 18 / LA', color:'#ff6b35',
    pairs:[{fwd:'18A',rev:'LA'},{fwd:'18B',rev:null},{fwd:'18C',rev:null}] },
];

const REVERSED = new Set(['09A','09B','09C','14A','14B','14C','LA']);
const PAIR_MAP  = {
  '08A':'09A','09A':'08A','08B':'09B','09B':'08B','08C':'09C','09C':'08C',
  '13A':'14A','14A':'13A','13B':'14B','14B':'13B','13C':'14C','14C':'13C',
  '18A':'LA','LA':'18A'
};
const ALL_AISLES = ['08A','08B','08C','09A','09B','09C','13A','13B','13C','14A','14B','14C','18A','18B','18C','LA'];

// ── SIM PICKER DEFINITIONS ────────────────────
// 4 simulated pickers, spread across zones so the map looks populated
const SIM_PICKERS = [
  { id:'CARLOS', color:'#a78bfa', aisle:'08A', bay:5  },
  { id:'TAMIKA', color:'#fb923c', aisle:'09B', bay:38 },
  { id:'JEROME', color:'#f472b6', aisle:'13C', bay:12 },
  { id:'DENISE', color:'#34d399', aisle:'14A', bay:41 },
];

// ── STATE ─────────────────────────────────────
let simPickers  = {};   // local simulation — never written to Firebase
let realPickers = {};   // from Firebase — real devices
let picksThisHour = [], totalPicks = 0, activityLog = [];

function pad(n){ return (n != null) ? n.toString().padStart(2,'0') : '??'; }
function locStr(a,b){ return (a && b != null) ? `${a}-${pad(b)}` : 'unknown'; }

// ── INIT SIM PICKERS ──────────────────────────
SIM_PICKERS.forEach(p => {
  simPickers[p.id] = {
    ...p,
    isReal: false,
    lastPickTime: Date.now() - Math.random() * 60000,
    picks: Math.floor(Math.random() * 40) + 8,
    // staggered initial pick delay so they don't all move at once
    nextPickIn: Math.random() * 3000 + 500,
    // pause counter: 0 = moving, >0 = paused ticks remaining
    pauseTicks: 0,
  };
});

// ── BUILD MAP ─────────────────────────────────
function buildBayRuler(){
  const ruler = document.getElementById('bayRuler');
  for(let b=1;b<=BAYS;b++){
    const el=document.createElement('div'); el.className='bay-ruler-label';
    el.textContent=(b===1||b%5===0)?pad(b):''; ruler.appendChild(el);
  }
}

function buildLayout(){
  const layout=document.getElementById('dcLayout');
  const zlGrid=document.getElementById('zlGrid');
  const totalRows=CLUSTERS.reduce((s,c)=>s+c.pairs.length*2,0);
  CLUSTERS.forEach(cluster=>{
    const div=document.createElement('div'); div.className='cluster-divider';
    div.innerHTML=`<div class="cluster-divider-line"></div><div class="cluster-divider-label" style="color:${cluster.color}">${cluster.label}</div><div class="cluster-divider-line"></div>`;
    layout.appendChild(div);
    cluster.pairs.forEach(pair=>{
      layout.appendChild(makeRow(pair.fwd,false,!!pair.rev,cluster.color,totalRows));
      layout.appendChild(makeRow(pair.rev,true,false,cluster.color,totalRows));
    });
    const item=document.createElement('div'); item.className='zl-item';
    item.innerHTML=`<div class="zl-swatch" style="background:${cluster.color}"></div><span>${cluster.label}</span>`;
    zlGrid.appendChild(item);
  });
}

function makeRow(aisleName,isRevRow,hasTurn,clusterColor,totalRows){
  const wrap=document.createElement('div');
  wrap.className='aisle-row-wrap'; wrap.style.flex=`${100/totalRows}%`; wrap.style.minHeight='0';
  if(!aisleName){
    wrap.innerHTML=`<div style="width:42px;flex-shrink:0"></div><div style="width:8px;flex-shrink:0"></div><div class="aisle-track empty-slot"></div><div style="width:16px;flex-shrink:0"></div>`;
    return wrap;
  }
  const rev=REVERSED.has(aisleName);
  const nameEl=document.createElement('div'); nameEl.className='aisle-name'; nameEl.style.color=clusterColor; nameEl.textContent=aisleName;
  const arrowEl=document.createElement('div'); arrowEl.className='dir-arrow'; arrowEl.textContent=rev?'←':'→';
  const track=document.createElement('div'); track.className='aisle-track'; track.id=`track-${aisleName}`;
  for(let b=1;b<=BAYS;b++){const s=document.createElement('div');s.className='bay-slot';s.id=`slot-${aisleName}-${b}`;track.appendChild(s);}
  const cap=document.createElement('div'); cap.className='aisle-cap';
  if(hasTurn) cap.innerHTML=`<div class="turn-arc" style="border-color:${clusterColor};opacity:.45"></div>`;
  else if(!rev) cap.innerHTML=`<div class="dead-bar"></div>`;
  wrap.appendChild(nameEl); wrap.appendChild(arrowEl); wrap.appendChild(track); wrap.appendChild(cap);
  return wrap;
}

// ── SIMULATION TICK ───────────────────────────
// Each sim picker walks in the correct direction, turns the horseshoe corner,
// and occasionally pauses (realistic scan + voice confirm delay)
function simTick(){
  Object.values(simPickers).forEach(p => {
    // Count down pause
    if(p.pauseTicks > 0){ p.pauseTicks--; return; }

    const rev = REVERSED.has(p.aisle);
    // Step 1-3 bays per tick (variable speed)
    const step = Math.floor(Math.random() * 3) + 1;

    if(rev){
      p.bay -= step;
      if(p.bay < 1){
        // Turn the corner to paired fwd aisle at bay 1
        const paired = PAIR_MAP[p.aisle];
        if(paired){ p.aisle = paired; p.bay = 1; }
        else { p.bay = BAYS; } // dead end reset
      }
    } else {
      p.bay += step;
      if(p.bay > BAYS){
        // Turn the corner to paired rev aisle at bay 45
        const paired = PAIR_MAP[p.aisle];
        if(paired){ p.aisle = paired; p.bay = BAYS; }
        else { p.bay = 1; } // dead end reset
      }
    }

    p.lastPickTime = Date.now();
    p.picks++;
    totalPicks++;
    picksThisHour.push(Date.now());

    activityLog.push({ id:p.id, color:p.color, loc:locStr(p.aisle,p.bay), time:Date.now(), isReal:false });
    if(activityLog.length > 120) activityLog.shift();

    // Random pause: 20% chance of a 2-5 tick pause (simulates scan + confirm)
    if(Math.random() < 0.2) p.pauseTicks = Math.floor(Math.random() * 4) + 2;
  });
}

// ── FIREBASE LISTENER ─────────────────────────
onValue(ref(db,'pickers'), snapshot => {
  const data = snapshot.val() || {};
  const now = Date.now();

  // Detect new real pick events
  Object.entries(data).forEach(([uid, p]) => {
    const prev = realPickers[uid];
    if(prev && p.timestamp !== prev.timestamp){
      totalPicks++;
      picksThisHour.push(now);
      activityLog.push({ id:uid, color:p.color||'#00d4ff', loc:locStr(p.aisle,p.bay), time:now, isReal:true });
      if(activityLog.length > 120) activityLog.shift();
    }
  });

  realPickers = data;

  document.getElementById('connStatus').textContent = 'Connected';
  document.getElementById('connStatus').className = 'conn-status connected';

  renderFrame();
});

// ── RENDER ────────────────────────────────────
function renderFrame(){
  document.querySelectorAll('.picker-dot').forEach(d=>d.remove());
  document.querySelectorAll('.aisle-track.has-picker').forEach(t=>t.classList.remove('has-picker'));

  const now = Date.now();
  let activeCount = 0;
  picksThisHour = picksThisHour.filter(t=>now-t<3600000);

  // Render sim pickers
  Object.values(simPickers).forEach(p => {
    const elapsed = now - p.lastPickTime;
    if(elapsed > TIMEOUT_MS) return;
    activeCount++;
    placeDot(p.aisle, p.bay, p.id, p.color, false);
  });

  // Render real pickers (on top, slightly larger)
  Object.entries(realPickers).forEach(([uid, p]) => {
    const elapsed = now - (p.timestamp||0);
    if(elapsed > TIMEOUT_MS) return;
    activeCount++;
    const isAsleep = p.status === 'idle';
    placeDot(p.aisle, p.bay, uid, p.color||'#00d4ff', true, isAsleep);
  });

  document.getElementById('statActive').textContent = activeCount;
  document.getElementById('statPicks').textContent  = totalPicks;
  document.getElementById('statRate').textContent   = picksThisHour.length;

  renderSidebar(now);
  renderFeed();
}

function placeDot(aisle, bay, label, color, isReal, isAsleep=false){
  const slot  = document.getElementById(`slot-${aisle}-${bay}`);
  const track = document.getElementById(`track-${aisle}`);
  if(!slot||!track) return;
  if(!isAsleep) track.classList.add('has-picker');
  const dot = document.createElement('div');
  dot.className = `picker-dot${isReal?' real':''}${isAsleep?' asleep':''}`;
  dot.style.background = color; dot.style.color = color;
  dot.style.boxShadow  = isAsleep ? 'none' : `0 0 ${isReal?10:7}px ${color},0 0 ${isReal?20:14}px ${color}55`;
  const lbl = document.createElement('div'); lbl.className='picker-dot-label'; lbl.style.color=isAsleep?'#facc15':color;
  lbl.textContent = isAsleep ? '💤' : label.substring(0,4);
  dot.appendChild(lbl); slot.appendChild(dot);
}

function renderSidebar(now){
  const list = document.getElementById('pickerList'); list.innerHTML='';

  // Real pickers first, then sim
  const allEntries = [
    ...Object.entries(realPickers)
      .filter(([uid,p]) => p.aisle && p.bay != null)
      .map(([uid,p])=>({
        id:uid, color:p.color||'#00d4ff', aisle:p.aisle, bay:p.bay,
        lastPickTime:p.timestamp||0, picks:p.picks||0, isReal:true,
        status:p.status||'active'
      })),
    ...Object.values(simPickers),
  ].sort((a,b)=>b.lastPickTime-a.lastPickTime);

  allEntries.forEach(p => {
    const elapsed = (now - p.lastPickTime) / 60000;
    const isAsleep = p.isReal && p.status === 'idle';
    const isActive = elapsed < 5 && !isAsleep;
    const elStr = elapsed<1?`${Math.floor(elapsed*60)}s ago`:elapsed<60?`${Math.floor(elapsed)}m ago`:'idle';
    const statusClass = isAsleep ? 'asleep' : p.isReal ? 'live' : isActive ? 'picking' : 'idle';
    const statusLabel = isAsleep ? '💤 IDLE' : p.isReal ? '● LIVE' : isActive ? 'picking' : 'idle';
    const cardClass   = isAsleep ? 'gone' : p.isReal ? 'real-active' : isActive ? 'active' : 'gone';
    const card = document.createElement('div'); card.className=`picker-card ${cardClass}`;
    card.innerHTML=`<div class="pbar" style="background:${isAsleep?'#facc15':isActive||p.isReal?p.color:'#1e2d3d'}"></div>
      <div class="picker-card-hdr">
        <div class="picker-id" style="color:${isAsleep?'#facc15':p.color}">${p.id}</div>
        <div class="pstatus ${statusClass}">${statusLabel}</div>
      </div>
      <div class="pdetail"><span>Location</span><strong>${locStr(p.aisle,p.bay)}</strong></div>
      <div class="pdetail"><span>Last pick</span><strong>${elStr}</strong></div>
      <div class="ppicks">↗ ${p.picks} picks today</div>`;
    list.appendChild(card);
  });
}

function renderFeed(){
  const feed=document.getElementById('feedScroll'); feed.innerHTML='';
  activityLog.slice(-25).reverse().forEach(item=>{
    const t=new Date(item.time);
    const ts=`${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
    const el=document.createElement('div');
    el.className=`feed-item${item.isReal?' real-event':''}`;
    el.innerHTML=`<span class="ftime">${ts}</span>
      <span class="fuser" style="color:${item.color}">${item.id.substring(0,6)}</span>
      <span class="floc">${item.loc}</span>
      ${item.isReal?'<span class="fbadge">LIVE</span>':''}`;
    feed.appendChild(el);
  });
}

// ── MAIN LOOP ─────────────────────────────────
// Sim ticks every 1.2-2.5s per picker independently
function scheduleSimPicker(pickerId){
  const p = simPickers[pickerId];
  if(!p) return;
  const delay = p.pauseTicks > 0 ? 800 : (900 + Math.random() * 1600);
  setTimeout(()=>{
    try {
      simTick_single(pickerId);
      renderFrame();
    } catch(e) {
      console.error('simTick error for', pickerId, e);
    }
    scheduleSimPicker(pickerId); // always reschedule even if tick errored
  }, delay);
}

function simTick_single(pickerId){
  const p = simPickers[pickerId];
  if(!p) return;
  if(p.pauseTicks > 0){ p.pauseTicks--; return; }

  const rev = REVERSED.has(p.aisle);
  const step = Math.floor(Math.random()*3)+1;

  if(rev){
    p.bay -= step;
    if(p.bay < 1){
      const paired = PAIR_MAP[p.aisle];
      p.aisle = paired || p.aisle; p.bay = paired ? 1 : BAYS;
    }
  } else {
    p.bay += step;
    if(p.bay > BAYS){
      const paired = PAIR_MAP[p.aisle];
      p.aisle = paired || p.aisle; p.bay = paired ? BAYS : 1;
    }
  }

  p.lastPickTime = Date.now();
  p.picks++;
  totalPicks++;
  picksThisHour.push(Date.now());
  activityLog.push({ id:p.id, color:p.color, loc:locStr(p.aisle,p.bay), time:Date.now(), isReal:false });
  if(activityLog.length>120) activityLog.shift();
  if(Math.random()<0.2) p.pauseTicks = Math.floor(Math.random()*4)+2;
}

// ── AUTO-CLEANUP STALE PICKERS FROM FIREBASE ──
setInterval(async () => {
  const now = Date.now();
  Object.entries(realPickers).forEach(async ([uid, p]) => {
    if (now - (p.timestamp || 0) > TIMEOUT_MS) {
      await set(ref(db, `pickers/${uid}`), null);
    }
  });
}, 2 * 60 * 1000);

// ── BOOT ──────────────────────────────────────
buildBayRuler();
buildLayout();
// Stagger each sim picker's start so they don't all move in sync
Object.keys(simPickers).forEach((id, i) => {
  setTimeout(()=> scheduleSimPicker(id), i * 700 + Math.random() * 500);
});
renderFrame();
</script>
