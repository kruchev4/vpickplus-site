<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" role="img" aria-labelledby="title">
  <title>SilentScan™</title>
  <defs>
    <style>
      .stroke{stroke:currentColor;stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:currentColor}
      .muted{stroke:currentColor;stroke-width:1.4;opacity:.5}
      .line{stroke:currentColor;stroke-width:2.2;opacity:.65}
    </style>
  </defs>
  <!-- Speaker (base) -->
  <path class="stroke" d="M5.5 13H8l4.5 3V8L8 11H5.5a1.5 1.5 0 0 0-1.5 1.5v0A1.5 1.5 0 0 0 5.5 13Z"/>
  <!-- Sound waves (muted style) -->
  <path class="muted" d="M15 10.5c.8.7 1.25 1.2 1.25 1.5s-.45.8-1.25 1.5"/>
  <path class="muted" d="M16.8 9.4c1.3 1.05 2.1 1.9 2.1 2.6s-.8 1.55-2.1 2.6"/>
  <!-- Scan line across (indicates scan-driven state) -->
  <path class="line" d="M4 12h16"/>
  <!-- Small vibration cue icon -->
  <path class="stroke" d="M7.2 6.5l.8 1.2M6 7.8l1.2.8M16.8 17.5l-.8-1.2M18 16.2l-1.2-.8"/>
</svg>
