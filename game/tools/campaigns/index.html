<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campaign Generator</title>
  <link rel="stylesheet" href="./campaigns.css" />
</head>
<body>
  <h1>Campaign Generator</h1>

  <section id="generator">
    <h2>Generate Campaign</h2>

    <label>
      Seed:
      <input id="seed" value="campaign_seed_2026" />
    </label>

    <label>
      Dungeon Count:
      <input id="count" type="number" value="8" min="1" max="20" />
    </label>

    <label>
      Difficulty Ramp:
      <select id="difficulty">
        <option value="progressive">Progressive</option>
        <option value="flat">Flat</option>
      </select>
    </label>

    <label>
      Biomes:
      <input type="checkbox" checked data-biome="forest" /> Forest
      <input type="checkbox" checked data-biome="cavern" /> Cavern
      <input type="checkbox" checked data-biome="crypt" /> Crypt
      <input type="checkbox" data-biome="ruins" /> Ruins
    </label>

    <button id="generate">Generate Campaign</button>
  </section>

  <section id="results">
    <h2>Generated Dungeons</h2>
    <ul id="dungeon-list"></ul>
  </section>

  <script type="module" src="./campaigns.js"></script>
</body>
</html>
