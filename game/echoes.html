<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campaign Generator</title>

  <!-- Campaign Generator Styles -->
  <link rel="stylesheet" href="./campaigns.css" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>

  <!-- ================================
       Page Header
       ================================ -->

  <h1>Campaign Generator</h1>
  <p class="muted">
    Developer tool for generating and inspecting campaign dungeon content.
  </p>

  <!-- ================================
       Campaign Generator Form
       ================================ -->

  <section id="generator">
    <h2>Generate Campaign</h2>

    <label>
      Campaign Seed
      <input id="seed" value="campaign_seed_2026" />
    </label>

    <label>
      Dungeon Count
      <input id="count" type="number" value="8" min="1" max="20" />
    </label>

    <label>
      Difficulty Ramp
      <select id="difficulty">
        <option value="progressive">Progressive</option>
        <option value="flat">Flat</option>
      </select>
    </label>

    <label>
      Biomes
      <div class="biomes">
        <label><input type="checkbox" checked data-biome="forest" /> Forest</label>
        <label><input type="checkbox" checked data-biome="cavern" /> Cavern</label>
        <label><input type="checkbox" checked data-biome="crypt" /> Crypt</label>
        <label><input type="checkbox" data-biome="ruins" /> Ruins</label>
        <label><input type="checkbox" data-biome="frost" /> Frost</label>
        <label><input type="checkbox" data-biome="magma" /> Magma</label>
      </div>
    </label>

    <button id="generate">Generate Campaign</button>
  </section>

  <!-- ================================
       Generated Dungeons
       ================================ -->

  <section id="results">
    <h2>Generated Dungeons</h2>

    <!-- Dungeon cards are injected here -->
    <ul id="dungeon-list"></ul>

    <!-- Empty state -->
    <p id="no-results" class="muted">
      No dungeons generated yet.
    </p>
  </section>

  <!-- ================================
       Dungeon Preview Template
       (cloned by JS)
       ================================ -->

  <template id="dungeon-card-template">
    <li class="dungeon-card">

      <div class="dungeon-header">
        <div class="dungeon-title">
          <span class="dungeon-name"></span>
          <span class="dungeon-id"></span>
        </div>
        <span class="dungeon-tier"></span>
      </div>

      <div class="dungeon-body">
        <canvas class="dungeon-preview" width="160" height="160"></canvas>

        <div class="dungeon-stats">
          <span class="stat-type"></span>
          <span class="stat-size"></span>
          <span class="stat-rooms"></span>
          <span class="stat-monsters"></span>
          <span class="boss-flag hidden">Boss Present</span>
        </div>
      </div>

      <div class="dungeon-actions">
        <button class="view-json">View JSON</button>
        <button class="danger delete-dungeon">Delete</button>
      </div>

      <!-- Raw JSON (hidden by default) -->
      <pre class="dungeon-json hidden"></pre>
    </li>
  </template>

  <!-- ================================
       Controller Logic
       ================================ -->

  <script type="module" src="./campaigns.js"></script>

</body>
</html>
