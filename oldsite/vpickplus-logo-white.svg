
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-label="VPick+ logo">
  <title>VPick+ logo</title>
  <defs>
    <style>
      .teal{fill:#111315}
      .black{fill:#111315}
    </style>
  </defs>
  <!-- Sharp geometric V -->
  <g transform="translate(8,8)">
    <!-- V outline built from two strokes; left arm carries horizontal barcode motif -->
    <g>
      <!-- Left arm base -->
      <polygon class="teal" points="0,0 24,0 54,95 34,95"/>
      <!-- Horizontal barcode stripes (subtle) -->
      <g opacity="0.75">
        <rect class="teal" x="2" y="6" width="20" height="2"/>
        <rect class="teal" x="2" y="14" width="20" height="1.4"/>
        <rect class="teal" x="2" y="21" width="20" height="1.8"/>
        <rect class="teal" x="2" y="28" width="20" height="1.2"/>
        <rect class="teal" x="2" y="36" width="20" height="1.8"/>
        <rect class="teal" x="2" y="44" width="20" height="1.2"/>
        <rect class="teal" x="2" y="52" width="20" height="1.8"/>
        <rect class="teal" x="2" y="60" width="20" height="1.2"/>
        <rect class="teal" x="2" y="68" width="20" height="1.6"/>
        <rect class="teal" x="2" y="76" width="20" height="1.2"/>
        <rect class="teal" x="2" y="84" width="20" height="1.6"/>
      </g>
      <!-- Right arm of V -->
      <polygon class="teal" points="60,0 84,0 54,95 34,95" transform="translate(60,0) scale(-1,1) translate(-60,0)"/>
    </g>
    <!-- Wordmark -->
    <g transform="translate(150,18)">
      <text class="black" x="0" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="500" letter-spacing="0.2">Pick</text>
      <!-- + in brand teal, positioned to upper-right of k -->
      <circle class="teal" cx="222" cy="18" r="11"/>
      <text class="teal" x="216.5" y="22" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">+</text>
    </g>
  </g>
</svg>
