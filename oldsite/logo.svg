<svg xmlns="http://www.w3.org/2000/svg" width="320" height="90" viewBox="0 0 320 90">
  <defs>
    <style>
      .v-shape { fill:#2B8781; }
      .text { fill:#1a1a1a; font-family:'Inter', sans-serif; font-weight:500; }
      .plus { fill:#2B8781; font-family:'Inter', sans-serif; font-weight:700; }
    </style>
  </defs>

  <!-- Stylized V -->
  <polygon class="v-shape" points="20,10 45,10 95,80 70,80" />
  <rect class="v-shape" x="28" y="18" width="40" height="6" />
  <rect class="v-shape" x="34" y="30" width="40" height="6" />
  <rect class="v-shape" x="40" y="42" width="40" height="6" />
  <rect class="v-shape" x="46" y="54" width="40" height="6" />

  <!-- Pick -->
  <text class="text" x="115" y="63" font-size="48">Pick</text>

  <!-- Plus Symbol -->
  <text class="plus" x="245" y="63" font-size="52">+</text>
</svg>
