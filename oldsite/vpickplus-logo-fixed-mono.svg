
/* VPick+ Light Theme Styles v1.0 (recreated) */
:root{
  --teal:#2B8781; --blue:#2B6CB0; --onyx:#111315;
  --slate-900:#1F2428; --slate-700:#394046; --slate-300:#C3C9CE; --slate-100:#EEF2F5;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff;color:var(--onyx);font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;line-height:1.6}
.container{max-width:1120px;margin:0 auto;padding:0 24px}
header{border-bottom:1px solid var(--slate-100);background:#fff;position:sticky;top:0;z-index:50}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--onyx)}
nav a{color:var(--slate-700);text-decoration:none;margin:0 10px;font-weight:500}
nav a:hover{color:var(--teal)}
.button{display:inline-block;background:var(--blue);color:#fff;padding:12px 18px;border-radius:8px;text-decoration:none;font-weight:600}
.button.secondary{background:transparent;color:var(--blue);border:1px solid var(--blue)}
main section{padding:56px 0}
.hero{padding:64px 0 32px}
.hero-wrap{display:grid;grid-template-columns:1.1fr 0.2fr 1.2fr;gap:0;align-items:center}
.hero h1{font-family:Montserrat, Inter;line-height:1.15;margin:0 0 16px;font-size:40px}
.hero p.sub{font-size:18px;color:var(--slate-700);margin:0 0 24px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.curve{width:100%;height:420px;background:linear-gradient(180deg, rgba(43,135,129,0.00) 0%, rgba(43,135,129,0.06) 55%, rgba(43,135,129,0.00) 100%);mask-image:url('assets/curve-s.svg');-webkit-mask-image:url('assets/curve-s.svg');mask-repeat:no-repeat;-webkit-mask-repeat:no-repeat;mask-size:contain;-webkit-mask-size:contain;mask-position:center;-webkit-mask-position:center}
.hero-image{position:relative;width:100%;height:420px;border-radius:12px;overflow:hidden;background:#f7f9fb;border:1px solid var(--slate-100)}
.hero-image .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--slate-700);font-size:14px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:28px}
.card{border:1px solid var(--slate-100);border-radius:12px;padding:20px;background:#fff}
.section-title{font-family:Montserrat, Inter;font-size:28px;margin:0 0 16px}
.section-sub{color:var(--slate-700);margin:0 0 24px}
.list{display:grid;gap:8px;margin:0;padding:0 0 0 18px}
.footer-cta{background:var(--slate-100);padding:28px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
footer{border-top:1px solid var(--slate-100);padding:24px 0;color:var(--slate-700)}
@media (max-width: 980px){.hero-wrap{grid-template-columns:1fr;gap:20px}.curve{height:40px}.hero-image{height:280px}.grid-2{grid-template-columns:1fr}}



/* === Visual Tuning v1.1: Reduce stark white, add structure === */
:root{ --bg-base:#FFFFFF; --bg-subtle:#FAFBFC; --bg-band:#F6F7F9; --header-accent: linear-gradient(180deg, rgba(43,135,129,.06), rgba(255,255,255,0)); }
main section:nth-of-type(2n){ background: var(--bg-band); }
.section-title{ position: relative; padding-top: 10px; }
.section-title::before{ content:""; position:absolute; left:-8px; top:-12px; right:60%; height:36px; background: var(--header-accent); border-radius: 10px; filter: blur(.2px); }
.hero .container > div:first-child{ background: #FCFDFD; border: 1px solid #EEF2F5; border-radius: 12px; padding: 20px; }
.card{ box-shadow: 0 1px 2px rgba(17,19,21,0.04), 0 4px 16px rgba(17,19,21,0.04); }
.footer-cta{ background: #E9EDF2; }
footer{ background: #F7F9FB; }
header{ background: #FCFDFD; }
